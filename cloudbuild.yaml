steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker build \
          --build-arg GEMINI_API_KEY=$$GEMINI_API_KEY \
          -t europe-west3-docker.pkg.dev/$PROJECT_ID/vestora/vestora-website:$COMMIT_SHA \
          -t europe-west3-docker.pkg.dev/$PROJECT_ID/vestora/vestora-website:latest \
          .
    secretEnv: ['GEMINI_API_KEY']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/vestora/vestora-website'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - vestora-website
      - '--image=europe-west3-docker.pkg.dev/$PROJECT_ID/vestora/vestora-website:$COMMIT_SHA'
      - '--region=europe-west3'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: GEMINI_API_KEY

images:
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/vestora/vestora-website'
